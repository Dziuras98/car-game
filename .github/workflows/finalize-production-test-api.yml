name: Finalize production test API

on:
  push:
    branches:
      - codex/full-project-remediation
    paths:
      - scripts/ci/finalize_production_test_api.py
      - .github/workflows/finalize-production-test-api.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/full-project-remediation
          fetch-depth: 0
      - name: Apply migration
        run: python scripts/ci/finalize_production_test_api.py
      - name: Commit migration result
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Migration produced no changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts
          git commit -m "Remove test-only naming from production APIs"
          git push origin HEAD:codex/full-project-remediation
