name: Windows Godot tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-godot-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.7-stable
  GODOT_ARCHIVE: Godot_v4.7-stable_win64.exe.zip
  GODOT_EXECUTABLE: Godot_v4.7-stable_win64_console.exe
  GODOT_EXPORT_TEMPLATES_ARCHIVE: Godot_v4.7-stable_export_templates.tpz
  GODOT_EXPORT_TEMPLATE_VERSION: 4.7.stable

jobs:
  tests:
    name: Godot 4.7 Windows tests and export
    runs-on: windows-2025
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download and verify Godot
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"

          $toolsDirectory = Join-Path $PWD "tools/godot"
          New-Item -ItemType Directory -Path $toolsDirectory -Force | Out-Null

          $baseUrl = "https://github.com/godotengine/godot-builds/releases/download/$env:GODOT_VERSION"
          $archivePath = Join-Path $env:RUNNER_TEMP $env:GODOT_ARCHIVE
          $sumsPath = Join-Path $env:RUNNER_TEMP "SHA512-SUMS.txt"
          Invoke-WebRequest -Uri "$baseUrl/$env:GODOT_ARCHIVE" -OutFile $archivePath
          Invoke-WebRequest -Uri "$baseUrl/SHA512-SUMS.txt" -OutFile $sumsPath

          $escapedArchiveName = [regex]::Escape($env:GODOT_ARCHIVE)
          $checksumLine = Get-Content -LiteralPath $sumsPath | Where-Object {
            $_ -match "^(?<hash>[0-9A-Fa-f]{128})\s+\*?$escapedArchiveName$"
          } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($checksumLine)) {
            throw "SHA512-SUMS.txt does not contain $env:GODOT_ARCHIVE."
          }
          $expectedHash = [regex]::Match(
            $checksumLine,
            "^(?<hash>[0-9A-Fa-f]{128})\s+\*?$escapedArchiveName$"
          ).Groups["hash"].Value.ToLowerInvariant()
          $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA512).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Godot archive SHA512 mismatch. Expected $expectedHash, received $actualHash."
          }

          Expand-Archive -LiteralPath $archivePath -DestinationPath $toolsDirectory -Force
          $godotPath = Join-Path $toolsDirectory $env:GODOT_EXECUTABLE
          if (-not (Test-Path -LiteralPath $godotPath -PathType Leaf)) {
            throw "Godot executable was not found after extraction: $godotPath"
          }
          "GODOT_BIN=$godotPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GODOT_SHA512_SUMS=$sumsPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify Godot version
        shell: pwsh
        run: |
          & $env:GODOT_BIN --version
          if ($LASTEXITCODE -ne 0) {
            throw "Godot version check failed with exit code $LASTEXITCODE."
          }

      - name: Verify project
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diagnosticDirectory = Join-Path $PWD "build/test-logs"
          New-Item -ItemType Directory -Path $diagnosticDirectory -Force | Out-Null
          "Workflow verification wrapper started." | Set-Content -LiteralPath (Join-Path $diagnosticDirectory "workflow-wrapper.log") -Encoding utf8

          try {
            ./scripts/ci/verify_project.ps1 -GodotBinary $env:GODOT_BIN
          }
          catch {
            $failureText = $_ | Out-String
            $failureText | Set-Content -LiteralPath (Join-Path $diagnosticDirectory "workflow-runner-failure.log") -Encoding utf8
            Write-Host $failureText
            throw
          }

      - name: Publish verification summary
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./scripts/ci/write_junit_step_summary.ps1 `
            -ReportPath (Join-Path $PWD "build/test-logs/junit.xml") `
            -SummaryPath $env:GITHUB_STEP_SUMMARY

      - name: Restore Godot export templates
        id: export-template-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/AppData/Roaming/Godot/export_templates/${{ env.GODOT_EXPORT_TEMPLATE_VERSION }}
          key: windows-godot-export-templates-${{ env.GODOT_VERSION }}-x86_64

      - name: Install Godot export templates
        if: steps.export-template-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"

          $baseUrl = "https://github.com/godotengine/godot-builds/releases/download/$env:GODOT_VERSION"
          $archivePath = Join-Path $env:RUNNER_TEMP $env:GODOT_EXPORT_TEMPLATES_ARCHIVE
          $extractDirectory = Join-Path $env:RUNNER_TEMP "godot-export-templates"
          $sourceDirectory = Join-Path $extractDirectory "templates"
          $targetDirectory = Join-Path $env:APPDATA "Godot/export_templates/$env:GODOT_EXPORT_TEMPLATE_VERSION"

          Invoke-WebRequest -Uri "$baseUrl/$env:GODOT_EXPORT_TEMPLATES_ARCHIVE" -OutFile $archivePath
          $escapedArchiveName = [regex]::Escape($env:GODOT_EXPORT_TEMPLATES_ARCHIVE)
          $checksumLine = Get-Content -LiteralPath $env:GODOT_SHA512_SUMS | Where-Object {
            $_ -match "^(?<hash>[0-9A-Fa-f]{128})\s+\*?$escapedArchiveName$"
          } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($checksumLine)) {
            throw "SHA512-SUMS.txt does not contain $env:GODOT_EXPORT_TEMPLATES_ARCHIVE."
          }
          $expectedHash = [regex]::Match(
            $checksumLine,
            "^(?<hash>[0-9A-Fa-f]{128})\s+\*?$escapedArchiveName$"
          ).Groups["hash"].Value.ToLowerInvariant()
          $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA512).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Godot export templates SHA512 mismatch. Expected $expectedHash, received $actualHash."
          }

          Remove-Item -LiteralPath $extractDirectory -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractDirectory -Force
          $releaseSource = Join-Path $sourceDirectory "windows_release_x86_64.exe"
          $debugSource = Join-Path $sourceDirectory "windows_debug_x86_64.exe"
          if (-not (Test-Path -LiteralPath $releaseSource -PathType Leaf)) {
            throw "The archive does not contain the Windows release template: $releaseSource"
          }
          if (-not (Test-Path -LiteralPath $debugSource -PathType Leaf)) {
            throw "The archive does not contain the Windows debug template: $debugSource"
          }

          New-Item -ItemType Directory -Path $targetDirectory -Force | Out-Null
          Copy-Item -LiteralPath $releaseSource -Destination $targetDirectory -Force
          Copy-Item -LiteralPath $debugSource -Destination $targetDirectory -Force

      - name: Verify Windows export templates
        shell: pwsh
        run: |
          $templateDirectory = Join-Path $env:APPDATA "Godot/export_templates/$env:GODOT_EXPORT_TEMPLATE_VERSION"
          $releaseTemplate = Join-Path $templateDirectory "windows_release_x86_64.exe"
          $debugTemplate = Join-Path $templateDirectory "windows_debug_x86_64.exe"

          if (-not (Test-Path -LiteralPath $releaseTemplate -PathType Leaf)) {
            throw "Windows release export template was not found: $releaseTemplate"
          }
          if (-not (Test-Path -LiteralPath $debugTemplate -PathType Leaf)) {
            throw "Windows debug export template was not found: $debugTemplate"
          }

      - name: Export and smoke-test Windows build
        shell: pwsh
        run: ./scripts/ci/export_windows.ps1 -GodotBinary $env:GODOT_BIN

      - name: Upload Windows build and diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: car-game-windows-${{ github.sha }}
          path: build/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 6
