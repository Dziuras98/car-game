name: Windows Godot tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-godot-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  apply-final-dpi-v3:
    name: Apply final DPI v3 calibration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out working branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/physics-dpi-recalibration
          fetch-depth: 0
          persist-credentials: true

      - name: Verify, apply and publish patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode agent/dpi-final.patch.gz.b64 | gzip --decompress > /tmp/dpi-final.patch
          echo "29f216c69f61603a2c186fa28a1f272706c02357c82e08671383c5a6ea8a1eb6  /tmp/dpi-final.patch" | sha256sum --check
          git apply --check /tmp/dpi-final.patch
          git apply /tmp/dpi-final.patch
          git checkout origin/master -- .github/workflows/windows-tests.yml
          rm -f agent/dpi-final.patch.gz.b64
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement DPI v3 and calibrate production cars [dpi-v3-applied]"
          git push origin HEAD:agent/physics-dpi-recalibration
