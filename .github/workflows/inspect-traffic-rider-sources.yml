name: Inspect Traffic Rider sources

on:
  pull_request:
    branches:
      - master
    paths:
      - tools/assets/inspect_traffic_rider_sources.py
      - .github/workflows/inspect-traffic-rider-sources.yml
      - '*.glb'
      - 'assets/third_party/sketchfab/traffic_rider_npc_vehicles/**/*.glb'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: traffic-rider-source-inspection-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pinned processor dependencies
        run: python -m pip install numpy==2.3.5 Pillow==12.2.0 trimesh==4.11.1

      - name: Inspect all approved sources
        run: python tools/assets/inspect_traffic_rider_sources.py

      - name: Upload inspection report
        uses: actions/upload-artifact@v4
        with:
          name: traffic-rider-source-inspection-${{ github.event.pull_request.head.sha || github.sha }}
          path: docs/assets/traffic_rider_source_inspection_all.json
          if-no-files-found: error
          retention-days: 14
