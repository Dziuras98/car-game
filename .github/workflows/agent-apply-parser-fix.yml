name: Apply Agent Parser Fix

on:
  push:
    branches:
      - agent/physics-dpi-recalibration

permissions:
  contents: write

jobs:
  apply-fix:
    if: ${{ !contains(github.event.head_commit.message, '[agent-parser-fix-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: agent/physics-dpi-recalibration
          fetch-depth: 0
          persist-credentials: true
      - name: Decode and apply parser fix
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode agent/parser-fix.patch.gz.b64 | gzip --decompress > /tmp/parser-fix.patch
          echo "7f3c12930c63182d288fb10fc77478bedee32a98278c768e22b55f563ddd220c  /tmp/parser-fix.patch" | sha256sum --check
          git apply --check /tmp/parser-fix.patch
          git apply /tmp/parser-fix.patch
          rm -f agent/parser-fix.patch.gz.b64 agent/trigger-parser-fix .github/workflows/agent-apply-parser-fix.yml
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix physics parser errors and add regression coverage [agent-parser-fix-applied]"
          git push origin HEAD:agent/physics-dpi-recalibration
