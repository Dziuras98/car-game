name: Repository audit bundle

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  bundle:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Report checked-out tree
        shell: pwsh
        run: git rev-parse 'HEAD^{tree}'

      - name: Create source bundle
        shell: pwsh
        run: |
          $paths = Get-ChildItem -Force | Where-Object { $_.Name -ne '.git' }
          Compress-Archive -Path $paths.FullName -DestinationPath repository-source.zip -CompressionLevel Optimal

      - name: Upload source bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: repository-source
          path: repository-source.zip
          if-no-files-found: error
          retention-days: 1
