name: Apply Agent Physics Patch

on:
  push:
    branches:
      - agent/physics-dpi-recalibration

permissions:
  contents: write

jobs:
  apply-patch:
    if: ${{ !contains(github.event.head_commit.message, '[agent-patch-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: agent/physics-dpi-recalibration
          fetch-depth: 0
          persist-credentials: true

      - name: Decode and apply verified physics patch
        shell: bash
        run: |
          set -euo pipefail
          cat agent/physics.patch.gz*.b64 | base64 --decode | gzip --decompress > /tmp/physics.patch
          echo "e3eb58da6ce6edcc2b44710b06fe6af13e528f0767bfc254a74b3a8155f32b87  /tmp/physics.patch" | sha256sum --check
          git apply --check /tmp/physics.patch
          git apply /tmp/physics.patch

          git checkout origin/master -- .github/workflows/windows-tests.yml
          rm -f agent/physics.patch.part*.b64
          rm -f agent/physics.patch.tail*.b64
          rm -f agent/physics.patch.gz*.b64

          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rework per-wheel vehicle physics [agent-patch-applied]"
          git push origin HEAD:agent/physics-dpi-recalibration
