name: Agent Source Export

on:
  push:
    branches:
      - agent/physics-dpi-recalibration

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: car-game-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
