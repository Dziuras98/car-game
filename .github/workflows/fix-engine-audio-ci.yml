name: Fix engine audio compile regression

on:
  push:
    branches:
      - agent/engine-audio-realism
    paths:
      - .github/workflows/fix-engine-audio-ci.yml
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/fix-engine-audio-ci.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/engine-audio-realism
          fetch-depth: 0
      - name: Apply fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/car/engine_audio.gd')
          text = path.read_text(encoding='utf-8')
          old = ') * startup_combustion_gate * shutdown_gate * combustion_state_gate'
          new = ') * startup_combustion_gate * combustion_state_gate'
          if text.count(old) != 1:
              raise RuntimeError(f'Expected one stale shutdown gate, found {text.count(old)}')
          text = text.replace(old, new, 1)
          text = text.replace(
              'var safe_rate: float = maxf(sample_rate, 1.0)\n\treturn 1.0 - pow(1.0 - safe_alpha, REFERENCE_SAMPLE_RATE / safe_rate)',
              'var safe_rate: float = maxf(sample_rate, 1.0)\n\tif is_equal_approx(safe_rate, REFERENCE_SAMPLE_RATE):\n\t\treturn safe_alpha\n\treturn 1.0 - pow(1.0 - safe_alpha, REFERENCE_SAMPLE_RATE / safe_rate)',
              1,
          )
          text = text.replace(
              'var safe_decay: float = clampf(decay_at_32k, 0.0, 1.0)\n\treturn pow(safe_decay, REFERENCE_SAMPLE_RATE / maxf(sample_rate, 1.0))',
              'var safe_decay: float = clampf(decay_at_32k, 0.0, 1.0)\n\tvar safe_rate: float = maxf(sample_rate, 1.0)\n\tif is_equal_approx(safe_rate, REFERENCE_SAMPLE_RATE):\n\t\treturn safe_decay\n\treturn pow(safe_decay, REFERENCE_SAMPLE_RATE / safe_rate)',
              1,
          )
          path.write_text(text, encoding='utf-8', newline='\n')

          bmw = Path('scripts/car/bmw_e46_engine_audio.gd')
          bmw_text = bmw.read_text(encoding='utf-8')
          firing_old = '''\tvar firing_hz: float = maxf(
\t\tEngineAudioSynthesizer.firing_frequency_hz(rpm, cylinders) * (1.0 + idle_wander),
\t\t1.0
\t)
'''
          firing_new = firing_old.replace('\t\t1.0\n', '\t\t0.0\n')
          if firing_old not in bmw_text:
              raise RuntimeError('BMW firing-frequency floor pattern was not found')
          bmw.write_text(bmw_text.replace(firing_old, firing_new, 1), encoding='utf-8', newline='\n')
          PY
          rm .github/workflows/fix-engine-audio-ci.yml
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix engine audio shutdown gate and filter fast path"
          git push origin HEAD:agent/engine-audio-realism
