name: Generate BMW F32 processed visual

on:
  push:
    branches:
      - agent/add-traffic-rider-vehicle-workflow
    paths:
      - .github/workflows/generate-bmw-f32-processed-visual.yml
      - tools/assets/process_traffic_rider_bmw_f32.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-bmw-f32-processed-visual
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out branch with LFS assets
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/add-traffic-rider-vehicle-workflow
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Install pinned processor dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check \
            numpy==2.3.5 \
            Pillow==12.2.0 \
            trimesh==4.11.1

      - name: Generate and verify processed GLB
        shell: bash
        run: |
          python tools/assets/process_traffic_rider_bmw_f32.py \
            assets/third_party/sketchfab/traffic_rider_npc_vehicles/bmw_4_series_f32/source/01_bmw_4_series_2014.glb \
            assets/third_party/sketchfab/traffic_rider_npc_vehicles/bmw_4_series_f32/processed/bmw_4_series_f32_processed.glb \
            docs/assets/traffic_rider_bmw_f32_processed_visual.json

      - name: Commit generated derivative
        shell: bash
        env:
          BRANCH_NAME: agent/add-traffic-rider-vehicle-workflow
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            assets/third_party/sketchfab/traffic_rider_npc_vehicles/bmw_4_series_f32/processed/bmw_4_series_f32_processed.glb \
            docs/assets/traffic_rider_bmw_f32_processed_visual.json
          if git diff --cached --quiet; then
            echo "Processed visual is already current."
            exit 0
          fi
          git commit -m "Generate processed BMW F32 visual"
          for attempt in 1 2 3; do
            if git pull --rebase origin "$BRANCH_NAME" && git push origin "HEAD:$BRANCH_NAME"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Could not publish generated derivative after three attempts." >&2
              exit 1
            fi
            sleep 2
          done
