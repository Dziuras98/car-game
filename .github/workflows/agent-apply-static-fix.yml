name: Apply Agent Static Check Fix

on:
  push:
    branches:
      - agent/physics-dpi-recalibration

permissions:
  contents: write

jobs:
  apply-fix:
    if: ${{ !contains(github.event.head_commit.message, '[agent-static-fix-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: agent/physics-dpi-recalibration
          fetch-depth: 0
          persist-credentials: true
      - name: Apply static-check update
        shell: bash
        run: |
          set -euo pipefail
          git apply --check agent/static-check-fix.patch
          git apply agent/static-check-fix.patch
          rm -f agent/static-check-fix.patch
          rm -f .github/workflows/agent-apply-static-fix.yml
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update physics static checks [agent-static-fix-applied]"
          git push origin HEAD:agent/physics-dpi-recalibration
