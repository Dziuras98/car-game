name: Apply audited repository patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Verify and apply audited patch
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          EXPECTED_GZIP_SHA256: 8a128fff6ccaaf9088e99912a9b6005c00205b635a4c707aa06592016d23cef7
          EXPECTED_PATCH_SHA256: 6b686bae9c0eedcbd7bb3b7156b63146752b126239313a2706ad2cbba422b673
        run: |
          set -euo pipefail
          cat \
            .github/audit-patch/part-00.txt \
            .github/audit-patch/part-01.txt \
            .github/audit-patch/part-02.txt \
            .github/audit-patch/part-03.txt \
            | tr -d '\r\n' \
            | base64 --decode > "${RUNNER_TEMP}/remaining.patch.gz"

          echo "${EXPECTED_GZIP_SHA256}  ${RUNNER_TEMP}/remaining.patch.gz" | sha256sum --check --strict
          gzip --decompress --stdout "${RUNNER_TEMP}/remaining.patch.gz" > "${RUNNER_TEMP}/remaining.patch"
          echo "${EXPECTED_PATCH_SHA256}  ${RUNNER_TEMP}/remaining.patch" | sha256sum --check --strict

          git apply --check "${RUNNER_TEMP}/remaining.patch"
          git apply "${RUNNER_TEMP}/remaining.patch"
          rm -rf .github/audit-patch
          rm -f .github/workflows/apply-audited-tree.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply audited cleanup and bug fixes"
          git push origin "HEAD:${HEAD_BRANCH}"
