name: Inspect 370Z source models

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Inspect third-party GLB assets
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Inspect 370Z GLB metadata
        run: python3 scripts/ci/inspect_370z_glbs.py | tee glb-inspection.txt

      - name: Upload GLB inspection report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: 370z-glb-inspection-${{ github.sha }}
          path: glb-inspection.txt
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
