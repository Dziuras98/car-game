name: Inspect 370Z source models

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Inspect third-party GLB assets
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Inspect 370Z GLB metadata
        run: python3 scripts/ci/inspect_370z_glbs.py
