name: Finalize repository cleanup

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Remove temporary audit transport
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/cleanup-overlay .github/workflows/apply-repository-cleanup.yml
          git commit -m "Remove temporary audit transport"
          git push origin "HEAD:${HEAD_BRANCH}"
