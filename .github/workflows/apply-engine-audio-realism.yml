name: Apply engine audio realism patch

on:
  push:
    branches:
      - agent/engine-audio-realism
    paths:
      - tools/apply_engine_audio_realism_patch.py
      - .github/workflows/apply-engine-audio-realism.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/apply_engine_audio_realism_patch.py
      - .github/workflows/apply-engine-audio-realism.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/engine-audio-realism
          fetch-depth: 0

      - name: Apply controlled source patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_engine_audio_realism_patch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('\t\tpush_warning(\n\t\t\t"EngineAudioProfile ignored', '\t\tprint_verbose(\n\t\t\t"EngineAudioProfile ignored')
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
          python tools/apply_engine_audio_realism_patch.py

      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Improve engine audio realism and runtime safety"
          git push origin HEAD:agent/engine-audio-realism
